<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДБР | Реєстр справ</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #2563eb;
            --text: #f8fafc;
            --gold: #f1c40f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        .header { 
            max-width: 1200px; 
            margin: 0 auto 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 20px; 
        }

        .btn { 
            display: inline-block; 
            padding: 12px 20px; 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 13px; 
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-add { background: #16a34a; margin-right: 10px; }

        .grid { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); }

        .card-img { width: 100%; height: 220px; object-fit: cover; background: #000; border-bottom: 3px solid var(--accent); }
        .card-content { padding: 20px; }
        
        .status-badge { 
            display: inline-block; 
            background: #e74c3c; 
            padding: 3px 10px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }

        .info-row { margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        .info-row b { color: white; }

        #loader { text-align: center; grid-column: 1/-1; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0; color: var(--gold);">КРИМІНАЛЬНІ СПРАВИ</h1>
        <p style="margin:5px 0 0; font-size:12px; color:#94a3b8;">ДЕРЖАВНЕ БЮРО РОЗСЛІДУВАНЬ</p>
    </div>
    <div>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeqGg_6sTa9Au72xe0c-IwRH-wv7d3If65Nfe8DUYO6PUN4Hw/viewform" target="_blank" class="btn btn-add">+ ОПУБЛІКУВАТИ СПРАВУ</a>
        <a href="staff.html" class="btn" style="background:#475569">← НАЗАД</a>
    </div>
</div>

<div id="cases-grid" class="grid">
    <div id="loader">Підключення до бази даних ДБР...</div>
</div>

<script>
    async function loadCases() {
        // ПОСИЛАННЯ НА ТВОЮ ТАБЛИЦЮ У ФОРМАТІ CSV
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSiZtkfaA6lvG8mtMoozlgqfIVBi-A4VQaGwt2sEjOP5KdQBcanfEvJ5XBpB0kgHUyuVvgBuRTyEo8-/pub?gid=492248995&single=true&output=csv";
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network error');
            const data = await response.text();
            
            // Розбиваємо на рядки та прибираємо порожні
            const lines = data.split('\n').filter(line => line.trim() !== '').slice(1);
            let html = '';

            // Нові справи показуємо першими
            lines.reverse().forEach(line => {
                // Розбиваємо рядок з урахуванням ком всередині тексту
                const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                if(cols.length < 5) return;

                const clean = (str) => str ? str.replace(/^"|"$/g, '').trim() : '';

                const suspect = clean(cols[1]); // Юзернейми
                const reason = clean(cols[2]);  // Порушення
                const desc = clean(cols[3]);    // Опис
                const photo = clean(cols[4]) || 'https://i.imgur.com/8N99m6p.png';
                const title = clean(cols[5]) || 'Справа без назви';
                const video = clean(cols[6]);   // Докази

                html += `
                <div class="card">
                    <img src="${photo}" class="card-img" onerror="this.src='https://i.imgur.com/8N99m6p.png'">
                    <div class="card-content">
                        <div class="status-badge">КРИМІНАЛЬНЕ ПРОВАДЖЕННЯ</div>
                        <h3 style="margin:0 0 15px 0; color:var(--accent); text-transform: uppercase;">${title}</h3>
                        <div class="info-row"><b>Фігуранти:</b> ${suspect}</div>
                        <div class="info-row"><b>Суть:</b> ${reason}</div>
                        <p style="font-size:13px; color:#94a3b8; border-top: 1px solid #334155; padding-top:10px; margin-top:10px;">${desc}</p>
                        <a href="${video}" target="_blank" class="btn" style="width:100%; box-sizing:border-box; text-align:center; margin-top:10px; background:#334155">🎬 ПЕРЕГЛЯНУТИ ВІДЕО</a>
                    </div>
                </div>`;
            });

            document.getElementById('cases-grid').innerHTML = html || "<div id='loader'>Справ у базі не знайдено.</div>";
        } catch (err) {
            console.error(err);
            document.getElementById('cases-grid').innerHTML = "<div id='loader' style='color:#ef4444'>Помилка синхронізації. Перевірте, чи таблиця опублікована в Інтернет (CSV).</div>";
        }
    }

    // Завантажуємо дані при старті
    window.onload = loadCases;
</script>

</body>
</html>
