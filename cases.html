<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ДБР | Реєстр справ</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #2563eb;
            --text: #f8fafc;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .header { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #000; }
        .card-content { padding: 15px; }
        .btn { display: inline-block; padding: 10px 20px; background: var(--accent); color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; font-size: 13px; }
        .btn-add { background: #16a34a; }
    </style>
</head>
<body>

<div class="header">
    <h1>АРХІВ СПРАВ</h1>
    <div>
        <a href="https://docs.google.com/forms/d/1NYMnkDJGukVPPvnWcvNpatJqa5ZlSlLDU7oM92yeIT8/viewform" target="_blank" class="btn btn-add">+ Нова справа</a>
        <a href="staff.html" class="btn" style="background:#475569">Назад</a>
    </div>
</div>

<div id="cases-grid" class="grid">Завантаження бази...</div>

<script>
    async function loadCases() {
        // ПРЯМЕ ПОСИЛАННЯ НА ТВОЮ ТАБЛИЦЮ (CSV)
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSiZtkfaA6lvG8mtMoozlgqfIVBi-A4VQaGwt2sEjOP5KdQBcanfEvJ5XBpB0kgHUyuVvgBuRTyEo8-/pub?gid=492248995&single=true&output=csv";
        
        try {
            const response = await fetch(url);
            const data = await response.text();
            const lines = data.split('\n').slice(1);
            let html = '';

            lines.reverse().forEach(line => {
                const cols = line.split(',');
                if(cols.length < 5) return;

                const name = cols[5] || "Без назви";
                const suspect = cols[1] || "Не вказано";
                const reason = cols[2] || "Порушення";
                const photo = cols[4] ? cols[4].trim() : "https://i.imgur.com/8N99m6p.png";
                const video = cols[6] ? cols[6].trim() : "#";

                html += `
                <div class="card">
                    <img src="${photo}" class="card-img" onerror="this.src='https://i.imgur.com/8N99m6p.png'">
                    <div class="card-content">
                        <h3 style="margin:0 0 10px 0; color:#f1c40f">${name}</h3>
                        <p><b>Фігуранти:</b> ${suspect}</p>
                        <p><b>Суть:</b> ${reason}</p>
                        <a href="${video}" target="_blank" class="btn">🎬 ДОКАЗИ</a>
                    </div>
                </div>`;
            });
            document.getElementById('cases-grid').innerHTML = html || "Справ поки немає";
        } catch (err) {
            document.getElementById('cases-grid').innerHTML = "Помилка завантаження. Перевірте публікацію таблиці.";
        }
    }
    loadCases();
</script>

</body>
</html>
