<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ДБР | Панель Керування</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #2563eb;
            --gold: #f1c40f;
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* ДОДАНО ФОН КАРТИ */
            background: url('dbrukraine.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ОСНОВНИЙ КОНТЕЙНЕР - ТЕПЕР ВІДКРИТИЙ ОДРАЗУ */
        .main-container {
            width: 1100px;
            height: 750px;
            /* ТРОХИ БІЛЬШЕ ПРОЗОРОСТІ ДЛЯ ЕФЕКТУ СКЛА */
            background: rgba(30, 41, 59, 0.6); 
            border-radius: 12px;
            overflow: hidden;
            display: grid; 
            grid-template-columns: 280px 1fr;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .sidebar {
            background: #111827;
            padding: 25px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .side-btn {
            width: 100%; padding: 12px;
            background: transparent; border: 1px solid transparent;
            color: #94a3b8; text-align: left; cursor: pointer;
            border-radius: 6px; margin-bottom: 8px; transition: 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .side-btn:hover, .side-btn.active {
            background: rgba(37, 99, 235, 0.15);
            color: white; border-color: var(--accent);
        }

        /* ДОДАНО РОЗМИТТЯ (BACKDROP BLUR) ДЛЯ КОНТЕНТУ */
        .content { 
            padding: 40px; 
            overflow-y: auto; 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        h2 { color: var(--gold); border-bottom: 2px solid #334155; padding-bottom: 15px; margin-top: 0; }
        
        .staff-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .staff-table th { text-align: left; color: #94a3b8; font-size: 12px; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #334155; }
        .staff-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        /* БАДЖІ РОЛЕЙ */
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .role-dir { background: #7f1d1d; color: #fecaca; }
        .role-deputy { background: #1e3a8a; color: #bfdbfe; }
        .role-agent { background: #334155; color: #f8fafc; }
        
        .tg-link { color: #38bdf8; text-decoration: none; }

        /* ПАНЕЛЬ ПРОФІЛЮ (DISCORD STYLE) */
        .user-footer {
            margin-top: auto;
            background: #232428;
            margin-left: -25px; margin-right: -25px; margin-bottom: -25px;
            padding: 12px 15px;
            display: flex; align-items: center; gap: 12px;
            border-top: 1px solid var(--border);
        }

        .user-avatar {
            width: 35px; height: 35px;
            background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; color: white; position: relative;
        }

        .status-dot {
            width: 12px; height: 12px; background: #3ba55d; border-radius: 50%;
            position: absolute; bottom: -2px; right: -2px; border: 3px solid #232428;
        }

        .user-meta { flex-grow: 1; }
        .user-nick { font-size: 14px; font-weight: bold; color: white; display: block; }
        .user-status { font-size: 11px; color: #b5bac1; display: block; }
        .logout-icon { cursor: pointer; opacity: 0.5; transition: 0.3s; color: white; margin-left: auto; }
        .logout-icon:hover { opacity: 1; color: #ef4444; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:30px;">
            <img src="dbr.png" width="35" onerror="this.src='https://i.imgur.com/8N99m6p.png'">
            <span style="font-weight:bold; font-size:14px; color:var(--gold)">БАЗА ДАНИХ</span>
        </div>
        
        <button class="side-btn active" onclick="load('staff', this)">👥 Особовий склад</button>
        <button class="side-btn" onclick="load('osd', this)">🔍 Відділ ОСД</button>
        <button class="side-btn" onclick="load('tsv', this)">⚔️ Відділ ТСВ</button>
        <button class="side-btn" onclick="window.location.href='cases.html'">📁 Справи</button>
        
        <div class="user-footer">
            <div class="user-avatar" id="u-avatar">
                A
                <div class="status-dot"></div>
            </div>
            <div class="user-meta">
                <span class="user-nick" id="u-name">artemMelnichenko2013</span>
                <span class="user-status">В мережі</span>
            </div>
            <div class="logout-icon" title="Вийти" onclick="location.href='index.html'">⚙️</div>
        </div>
    </div>
    
    <div class="content">
        <div id="display"></div>
    </div>
</div>

<script>
    function row(role, name, tg, clrClass) {
        return `<tr>
            <td><span class="role-badge ${clrClass}">${role}</span></td>
            <td><span style="color:white">${name}</span></td>
            <td><span class="tg-link">${tg}</span></td>
        </tr>`;
    }

    const dataBase = {
        staff: `<h2>ОСОБОВИЙ СКЛАД</h2>
                <table class="staff-table">
                    <thead>
                        <tr><th>Посада</th><th>Username</th><th>Зв'язок (TG)</th></tr>
                    </thead>
                    <tbody>
                        ${row("Директор", "Vaylet009", "@Vaylet009", "role-dir")}
                        ${row("Заступник", "artemMelnichenko2013", "ID: 5242336088", "role-deputy")}
                        ${row("Працівник", "Mr_Zver3000", "ID: 6626655148", "role-agent")}
                        ${row("Працівник", "Marsianin_l0l", "ID: 7636472784", "role-agent")}
                        ${row("Працівник", "Fakijdik", "@Stylelive62", "role-agent")}
                        ${row("Працівник", "Rjdef31", "@Rt_1098", "role-agent")}
                        ${row("Працівник", "constelations152", "ID: 7460379767", "role-agent")}
                        ${row("Працівник", "Caston08963", "ID: 7557434574", "role-agent")}
                        ${row("Працівник", "Kiril_30083008", "ID: 8830930892", "role-agent")}
                        ${row("Працівник", "Yffgjjifh", "ID: 5367053785", "role-agent")}
                        ${row("Працівник", "ROSTIKTHS", "@Mister_Pumasik", "role-agent")}
                        ${row("Працівник", "hdyfudjfv", "DATABASE", "role-agent")}
                        ${row("Працівник", "levopravo2024", "DATABASE", "role-agent")}
                        ${row("Працівник", "makxuitaem", "DATABASE", "role-agent")}
                        ${row("Працівник", "per4ik_rrrt", "DATABASE", "role-agent")}
                    </tbody>
                </table>`,
        
        osd: `<h2>ВІДДІЛ ОСД</h2>
              <p><b>Оперативно-слідчий департамент</b> — основний підрозділ, що відповідає за розслідування та боротьбу з корупцією.</p>
              <ul>
                  <li>Проведення допитів посадових осіб.</li>
                  <li>Збір та фіксація доказової бази.</li>
                  <li>Робота під прикриттям та впровадження.</li>
              </ul>`,
        
        tsv: `<h2>ВІДДІЛ ТСВ</h2>
              <p><b>Тактико-силовий відділ</b> — підрозділ швидкого реагування для забезпечення силової підтримки.</p>
              <ul>
                  <li>Силове затримання особливо небезпечних злочинців.</li>
                  <li>Проведення обшуків та штурмів будівель.</li>
                  <li>Охорона слідчої групи під час виконання завдань.</li>
              </ul>`
    };

    function load(key, btn) {
        document.getElementById('display').innerHTML = dataBase[key];
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }

    // Авто-завантаження першої вкладки при запуску
    window.onload = function() {
        load('staff', document.querySelector('.side-btn'));
        
        const user = localStorage.getItem('currentUser');
        if(user) {
            document.getElementById('u-name').innerText = user;
            document.getElementById('u-avatar').childNodes[0].textContent = user.charAt(0).toUpperCase();
        }
    }
</script>

</body>
</html>
